<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>papaNiang.editor — Éditeur de Facture</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="papaNiang.editor" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f13;
      --surface:   #16181f;
      --surface2:  #1e2028;
      --border:    #2a2d38;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e4e6f0;
      --muted:     #6b7080;
      --success:   #34d399;
      --error:     #f87171;
      --warn:      #fbbf24;
      --radius:    10px;
    }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }

    /* API key row — desktop */
    .api-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .api-row label {
      font-size: .75rem;
      color: var(--muted);
      white-space: nowrap;
    }
    #apiKey {
      width: 240px;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .8rem;
      outline: none;
      transition: border .2s;
    }
    #apiKey:focus { border-color: var(--accent); }

    /* Gear toggle (mobile only) */
    #apiToggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Collapsible API bar under header (mobile) */
    #apiBar {
      display: none; /* shown on mobile when toggled */
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    #apiBar label { font-size: .75rem; color: var(--muted); }
    #apiBar input {
      flex: 1;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .85rem;
      outline: none;
    }
    #apiBar input:focus { border-color: var(--accent); }

    /* ── Layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Canvas zone ── */
    .canvas-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: auto;
      padding: 24px;
      position: relative;
      min-height: 0;
    }

    #dropZone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      max-width: 520px;
      height: 320px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .2s, background .2s;
      text-align: center;
      padding: 24px;
    }
    #dropZone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,.06);
    }
    #dropZone svg { opacity: .35; flex-shrink: 0; }
    #dropZone p { color: var(--muted); font-size: .88rem; line-height: 1.5; }
    #dropZone strong { color: var(--text); }
    #fileInput { display: none; }

    #canvasWrap {
      display: none;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
      border-radius: 6px;
      overflow: hidden;
      max-width: 100%;
    }
    #mainCanvas {
      display: block;
      max-width: 100%;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Status */
    #statusBar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--surface2);
      font-size: .8rem;
      min-height: 36px;
    }
    #statusDot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s;
    }
    #statusDot.ok   { background: var(--success); }
    #statusDot.err  { background: var(--error); }
    #statusDot.busy { background: var(--warn); animation: pulse .8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #statusText { color: var(--muted); line-height: 1.4; font-size: .8rem; }

    /* Controls */
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .ctrl-row:last-child { margin-bottom: 0; }
    .ctrl-label {
      font-size: .75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .ctrl-label span { color: var(--text); font-variant-numeric: tabular-nums; }

    input[type="date"],
    input[type="time"],
    input[type="number"],
    input[type="text"],
    input[type="color"],
    select {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .85rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="color"] { padding: 2px 4px; height: 36px; cursor: pointer; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      touch-action: pan-x;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Color presets */
    .color-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .chip {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .chip:hover  { transform: scale(1.15); }
    .chip.active { border-color: var(--accent); transform: scale(1.1); }
    .chip-white  { background: #ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,.15); }
    .chip-black  { background: #000000; }
    .chip-gray   { background: #6b7280; }
    .chip-blue   { background: #3b82f6; }
    .chip-red    { background: #ef4444; }
    .chip-transparent {
      background: repeating-conic-gradient(#aaa 0% 25%, #fff 0% 50%) 0 0 / 10px 10px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.15);
    }

    /* Bold / Italic toggles */
    .style-toggles {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .toggle-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 40px;
    }
    .toggle-btn.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    #toggleBold  { font-weight: 700; }
    #toggleItalic { font-style: italic; }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .2s, transform .1s;
      width: 100%;
      min-height: 42px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-success   { background: var(--success); color: #0e0f13; }
    .btn-danger    { background: transparent; color: var(--error); border: 1px solid var(--error); }

    .btn-group { display: flex; flex-direction: column; gap: 8px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .85rem;
      color: var(--text);
      opacity: 0;
      transition: transform .3s, opacity .3s;
      pointer-events: none;
      z-index: 999;
      max-width: calc(100vw - 32px);
      text-align: center;
      line-height: 1.4;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Detection badge */
    #detectedBadge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(52,211,153,.1);
      border: 1px solid rgba(52,211,153,.25);
      border-radius: 6px;
      font-size: .78rem;
      color: var(--success);
      margin-bottom: 12px;
    }
    #detectedBadge.visible { display: flex; }

    /* Scrollbar (desktop) */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Sticky bottom bar (mobile action shortcuts) ── */
    #bottomBar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      gap: 8px;
      z-index: 200;
    }

    /* ════════════════════════════════════════
       RESPONSIVE — Tablet  ≤ 900px
       ════════════════════════════════════════ */
    @media (max-width: 900px) {
      .sidebar { width: 260px; }
      #apiKey  { width: 200px; }
    }

    /* ════════════════════════════════════════
       RESPONSIVE — Mobile  ≤ 640px
       ════════════════════════════════════════ */
    @media (max-width: 640px) {
      /* Allow page scroll */
      body { overflow-y: auto; }

      /* Header: logo left, gear right */
      header {
        height: 52px;
        padding: 0 16px;
      }
      header h1 { font-size: 1.05rem; }
      .api-row  { display: none; }   /* hide desktop API row */
      #apiToggle { display: flex; }  /* show gear button */

      /* Collapsible API bar */
      #apiBar.open { display: flex; flex-direction: column; gap: 6px; }

      /* Workspace stacks vertically */
      .workspace {
        flex-direction: column;
        overflow: visible;
        height: auto;
      }

      /* Canvas zone */
      .canvas-zone {
        padding: 12px;
        min-height: 200px;
        height: auto;
        overflow: visible;
        align-items: stretch;
        justify-content: flex-start;
      }

      #dropZone {
        height: 190px;
        gap: 10px;
        padding: 16px;
      }
      #dropZone svg { width: 36px; height: 36px; }
      #dropZone p   { font-size: .82rem; }

      #canvasWrap {
        width: 100%;
        box-shadow: 0 4px 20px rgba(0,0,0,.5);
      }
      #mainCanvas {
        width: 100% !important;
        height: auto !important;
      }

      /* Sidebar becomes full-width panel below canvas */
      .sidebar {
        width: 100%;
        border-left: none;
        border-top: 2px solid var(--border);
        overflow-y: visible;
        padding-bottom: 80px; /* space for sticky bottom bar */
      }

      .section { padding: 14px 16px; }

      /* Larger touch targets for sliders */
      input[type="range"] { height: 6px; }
      input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }
      input[type="range"]::-moz-range-thumb     { width: 24px; height: 24px; }

      /* Bigger inputs */
      input[type="date"],
      input[type="number"],
      input[type="text"],
      select { font-size: .9rem; padding: 10px 12px; }

      /* Bigger buttons */
      .btn { min-height: 48px; font-size: .9rem; }

      /* Two-col stays 2-col (color pickers fit fine) */

      /* Toast near bottom bar */
      #toast { bottom: 80px; font-size: .82rem; }

      /* Show sticky bottom action bar */
      #bottomBar { display: flex; }

      /* Hide action section from sidebar on mobile
         (buttons live in bottom bar instead) */
      #sideActions { display: none; }
    }

    /* Extra small (≤ 380px) */
    @media (max-width: 380px) {
      .two-col { grid-template-columns: 1fr; }
      #dropZone { height: 160px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>papaNiang.editor</h1>

  <!-- Desktop API row -->
  <div class="api-row">
    <label for="apiKey">Clé API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-…" autocomplete="off" />
  </div>

  <!-- Mobile gear button -->
  <button id="apiToggle" aria-label="Clé API" title="Clé API">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14" stroke-linecap="round"/>
      <path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke-linecap="round"/>
    </svg>
  </button>
</header>

<!-- Mobile collapsible API bar -->
<div id="apiBar">
  <label for="apiKeyMobile">Clé API Anthropic (sk-ant-…)</label>
  <input type="password" id="apiKeyMobile" placeholder="sk-ant-api03-…" autocomplete="off" />
</div>

<!-- ── Workspace ── -->
<div class="workspace">

  <!-- Canvas zone -->
  <div class="canvas-zone">
    <div id="dropZone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 8l4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p><strong>Glissez une image ici</strong><br/>ou appuyez pour choisir</p>
      <p style="font-size:.73rem;opacity:.6">JPG · PNG · WEBP</p>
      <input type="file" id="fileInput" accept="image/*" capture="environment" />
    </div>

    <div id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <!-- Sidebar / Control panel -->
  <aside class="sidebar">

    <!-- Status -->
    <div class="section">
      <div class="section-title">Statut</div>
      <div id="statusBar">
        <div id="statusDot"></div>
        <div id="statusText">Chargez une image pour commencer.</div>
      </div>
    </div>

    <!-- Date -->
    <div class="section">
      <div class="section-title">Nouvelle date</div>
      <div class="ctrl-row">
        <label class="ctrl-label">Date à inscrire</label>
        <input type="date" id="newDate" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Inclure l'heure</label>
        <div class="style-toggles">
          <button class="toggle-btn" id="toggleTime"
                  style="font-family:'DM Sans',sans-serif;font-size:.78rem;letter-spacing:.02em">
            Heure
          </button>
        </div>
      </div>
      <div id="timeOptions" style="display:none">
        <div class="ctrl-row">
          <label class="ctrl-label">Heure à inscrire</label>
          <input type="time" id="newTime" step="1" />
        </div>
        <div class="ctrl-row">
          <label class="ctrl-label">Format heure</label>
          <select id="timeFormat">
            <option value="HH:MM:SS">HH:MM:SS (13:12:12)</option>
            <option value="HH:MM">HH:MM (13:12)</option>
            <option value="HH:MM:SS AMPM">HH:MM:SS AM/PM (01:12:12 PM)</option>
            <option value="HH:MM AMPM">HH:MM AM/PM (01:12 PM)</option>
          </select>
        </div>
      </div>
      <div id="detectedBadge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="originalDateText">Date originale : —</span>
      </div>
      <button class="btn btn-primary" id="btnApply" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Appliquer la date
      </button>
    </div>

    <!-- Position & Size -->
    <div class="section">
      <div class="section-title">Position &amp; Taille</div>
      <div class="ctrl-row">
        <label class="ctrl-label">Position X <span id="valX">0</span></label>
        <input type="range" id="posX" min="0" max="2000" value="0" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Position Y <span id="valY">0</span></label>
        <input type="range" id="posY" min="0" max="2000" value="0" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Largeur zone <span id="valW">120</span></label>
        <input type="range" id="zoneW" min="20" max="600" value="120" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Hauteur zone <span id="valH">30</span></label>
        <input type="range" id="zoneH" min="10" max="200" value="30" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Taille police <span id="valFS">16</span>px</label>
        <input type="range" id="fontSize" min="6" max="72" value="16" />
      </div>
    </div>

    <!-- Style -->
    <div class="section">
      <div class="section-title">Style</div>
      <div class="two-col">
        <div class="ctrl-row">
          <label class="ctrl-label">Texte</label>
          <input type="color" id="textColor" value="#000000" />
        </div>
        <div class="ctrl-row">
          <label class="ctrl-label">Cache</label>
          <input type="color" id="bgColor" value="#ffffff" />
        </div>
      </div>
      <!-- Preset chips: text color -->
      <div class="ctrl-row" style="margin-top:4px">
        <label class="ctrl-label">Couleur texte rapide</label>
        <div class="color-chips" id="textChips">
          <span class="chip chip-white"       data-color="#ffffff" title="Blanc"></span>
          <span class="chip chip-black active" data-color="#000000" title="Noir"></span>
          <span class="chip chip-gray"        data-color="#6b7280" title="Gris"></span>
          <span class="chip chip-blue"        data-color="#3b82f6" title="Bleu"></span>
          <span class="chip chip-red"         data-color="#ef4444" title="Rouge"></span>
        </div>
      </div>
      <!-- Preset chips: cache color -->
      <div class="ctrl-row">
        <label class="ctrl-label">Couleur cache rapide</label>
        <div class="color-chips" id="bgChips">
          <span class="chip chip-white active" data-color="#ffffff" title="Blanc"></span>
          <span class="chip chip-black"        data-color="#000000" title="Noir"></span>
          <span class="chip chip-gray"         data-color="#6b7280" title="Gris"></span>
          <span class="chip chip-transparent"  data-color="transparent" title="Transparent (pas de cache)"></span>
        </div>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Format de date</label>
        <select id="dateFormat">
          <option value="dd/mm/yyyy">DD/MM/YYYY</option>
          <option value="mm/dd/yyyy">MM/DD/YYYY</option>
          <option value="yyyy-mm-dd">YYYY-MM-DD</option>
          <option value="dd.mm.yyyy">DD.MM.YYYY</option>
          <option value="dd mm yyyy">DD MM YYYY</option>
          <option value="long-fr">1 janvier 2025 (FR)</option>
          <option value="long-en">January 1, 2025 (EN)</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Police</label>
        <select id="fontFamily">
          <option value="Arial">Arial</option>
          <option value="Helvetica">Helvetica</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Style du texte</label>
        <div class="style-toggles">
          <button class="toggle-btn" id="toggleBold"   title="Gras">G</button>
          <button class="toggle-btn" id="toggleItalic" title="Italique">I</button>
        </div>
      </div>
    </div>

    <!-- Claude Detection -->
    <div class="section">
      <div class="section-title">Détection IA</div>
      <button class="btn btn-secondary" id="btnDetect" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
        Détecter la date avec Claude
      </button>
    </div>

    <!-- Actions (desktop only — mobile uses #bottomBar) -->
    <div class="section" id="sideActions">
      <div class="section-title">Actions</div>
      <div class="btn-group">
        <button class="btn btn-success" id="btnDownload" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Télécharger PNG
        </button>
        <button class="btn btn-danger" id="btnReset" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9 9 0 00-9 9M3 3v4h4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Réinitialiser
        </button>
      </div>
    </div>

  </aside>
</div>

<!-- ── Mobile sticky bottom action bar ── -->
<div id="bottomBar">
  <button class="btn btn-success" id="btnDownloadM" disabled style="flex:1">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Télécharger
  </button>
  <button class="btn btn-danger" id="btnResetM" disabled style="flex:0 0 auto;width:auto;padding:10px 18px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9 9 0 00-9 9M3 3v4h4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
const state = {
  originalImage: null,
  base64Data:    null,
  mediaType:     'image/jpeg',
  detection:     null,
  modified:      false,
};

// ── DOM refs ───────────────────────────────────────────
const canvas      = document.getElementById('mainCanvas');
const ctx         = canvas.getContext('2d');
const dropZone    = document.getElementById('dropZone');
const canvasWrap  = document.getElementById('canvasWrap');
const fileInput   = document.getElementById('fileInput');

const apiKeyEl    = document.getElementById('apiKey');
const apiKeyMobEl = document.getElementById('apiKeyMobile');
const apiToggleEl = document.getElementById('apiToggle');
const apiBarEl    = document.getElementById('apiBar');

const newDateEl   = document.getElementById('newDate');
const btnApply    = document.getElementById('btnApply');
const btnDetect   = document.getElementById('btnDetect');
const btnDownload = document.getElementById('btnDownload');
const btnReset    = document.getElementById('btnReset');
const btnDownloadM= document.getElementById('btnDownloadM');
const btnResetM   = document.getElementById('btnResetM');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const detBadge    = document.getElementById('detectedBadge');
const origDateTx  = document.getElementById('originalDateText');
const toast       = document.getElementById('toast');

// Controls
const posXEl   = document.getElementById('posX');
const posYEl   = document.getElementById('posY');
const zoneWEl  = document.getElementById('zoneW');
const zoneHEl  = document.getElementById('zoneH');
const fontSzEl = document.getElementById('fontSize');
const textColEl= document.getElementById('textColor');
const bgColEl  = document.getElementById('bgColor');
const dateFmtEl  = document.getElementById('dateFormat');
const fontFamEl  = document.getElementById('fontFamily');
const newTimeEl  = document.getElementById('newTime');
const timeFmtEl  = document.getElementById('timeFormat');
const timeOptEl  = document.getElementById('timeOptions');
const toggleTimeEl = document.getElementById('toggleTime');

const valX = document.getElementById('valX');
const valY = document.getElementById('valY');
const valW = document.getElementById('valW');
const valH = document.getElementById('valH');
const valFS= document.getElementById('valFS');

// ── API key sync desktop ↔ mobile ──────────────────────
function getApiKey() {
  return (apiKeyEl.value || apiKeyMobEl.value).trim();
}
apiKeyEl.addEventListener('input', () => { apiKeyMobEl.value = apiKeyEl.value; sessionStorage.setItem('pd_api_key', apiKeyEl.value); });
apiKeyMobEl.addEventListener('input', () => { apiKeyEl.value = apiKeyMobEl.value; sessionStorage.setItem('pd_api_key', apiKeyMobEl.value); });

const savedKey = sessionStorage.getItem('pd_api_key');
if (savedKey) { apiKeyEl.value = savedKey; apiKeyMobEl.value = savedKey; }

// Gear toggle
apiToggleEl.addEventListener('click', () => apiBarEl.classList.toggle('open'));

// ── Helpers ────────────────────────────────────────────
function setStatus(msg, type = '') {
  statusText.textContent = msg;
  statusDot.className = type;
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

function formatDate(isoStr, fmt) {
  if (!isoStr) return '';
  const [y, m, d] = isoStr.split('-');
  const FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  switch (fmt) {
    case 'dd/mm/yyyy': return `${d}/${m}/${y}`;
    case 'mm/dd/yyyy': return `${m}/${d}/${y}`;
    case 'yyyy-mm-dd': return `${y}-${m}-${d}`;
    case 'dd.mm.yyyy': return `${d}.${m}.${y}`;
    case 'dd mm yyyy': return `${d} ${m} ${y}`;
    case 'long-fr':    return `${parseInt(d)} ${FR[parseInt(m)-1]} ${y}`;
    case 'long-en':    return `${EN[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
    default:           return `${d}/${m}/${y}`;
  }
}

function formatTime(timeStr, fmt) {
  if (!timeStr) return '';
  const parts = timeStr.split(':').map(Number);
  const h = parts[0] || 0;
  const m = parts[1] || 0;
  const s = parts[2] || 0;
  const hh = String(h).padStart(2, '0');
  const mm = String(m).padStart(2, '0');
  const ss = String(s).padStart(2, '0');
  switch (fmt) {
    case 'HH:MM': return `${hh}:${mm}`;
    case 'HH:MM:SS AMPM': {
      const period = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${String(h12).padStart(2,'0')}:${mm}:${ss} ${period}`;
    }
    case 'HH:MM AMPM': {
      const period = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${String(h12).padStart(2,'0')}:${mm} ${period}`;
    }
    default: return `${hh}:${mm}:${ss}`;
  }
}

function isMobile() { return window.innerWidth <= 640; }

// ── Image loading ──────────────────────────────────────
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showToast('Fichier non supporté. Utilisez JPG, PNG ou WEBP.');
    return;
  }
  state.mediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    state.base64Data = dataUrl.split(',')[1];

    const img = new Image();
    img.onload = () => {
      state.originalImage = img;
      state.modified = false;
      state.detection = null;
      detBadge.classList.remove('visible');

      // Compute display scale
      const containerW = canvasWrap.parentElement.clientWidth;
      const containerH = canvasWrap.parentElement.clientHeight;
      const padH = isMobile() ? 24 : 48;
      const padW = isMobile() ? 24 : 48;
      const maxW = containerW - padW;
      const maxH = isMobile()
        ? Math.max(220, window.innerHeight * 0.45)
        : (containerH > 100 ? containerH - padH : window.innerHeight * 0.7);

      const scale = Math.min(1, maxW / img.width, maxH / img.height);

      canvas.width  = img.width;
      canvas.height = img.height;
      canvas.style.width  = Math.round(img.width  * scale) + 'px';
      canvas.style.height = Math.round(img.height * scale) + 'px';

      ctx.drawImage(img, 0, 0);

      posXEl.max = img.width;
      posYEl.max = img.height;
      zoneWEl.max= img.width;
      zoneHEl.max= img.height;

      dropZone.style.display   = 'none';
      canvasWrap.style.display = 'block';

      btnApply.disabled    = false;
      btnDetect.disabled   = false;
      btnDownload.disabled = false;
      btnReset.disabled    = false;
      btnDownloadM.disabled= false;
      btnResetM.disabled   = false;

      setStatus('Image chargée. Ajustez ou lancez la détection IA.', 'ok');

      // Scroll to canvas on mobile
      if (isMobile()) canvasWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

// Drop & click
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

// ── Slider sync ────────────────────────────────────────
function syncSliders() {
  valX.textContent = posXEl.value;
  valY.textContent = posYEl.value;
  valW.textContent = zoneWEl.value;
  valH.textContent = zoneHEl.value;
  valFS.textContent= fontSzEl.value;
}
[posXEl, posYEl, zoneWEl, zoneHEl, fontSzEl].forEach(el => el.addEventListener('input', syncSliders));
syncSliders();

// ── Apply overlay ──────────────────────────────────────
function applyOverlay() {
  if (!state.originalImage) return;

  ctx.drawImage(state.originalImage, 0, 0);

  const x  = parseInt(posXEl.value);
  const y  = parseInt(posYEl.value);
  const w  = parseInt(zoneWEl.value);
  const h  = parseInt(zoneHEl.value);
  const fs = parseInt(fontSzEl.value);
  const tc = textColEl.value;
  const bc = bgColEl.value;
  const ff = fontFamEl.value;
  const dateStr = formatDate(newDateEl.value, dateFmtEl.value);

  if (!dateStr) { showToast('Sélectionnez une date.'); return; }

  const showTime = toggleTimeEl.classList.contains('on');
  const timeStr  = showTime && newTimeEl.value ? ' ' + formatTime(newTimeEl.value, timeFmtEl.value) : '';
  const displayStr = dateStr + timeStr;

  if (!useTransparentBg) {
    ctx.fillStyle = bc;
    ctx.fillRect(x, y, w, h);
  }

  ctx.fillStyle = tc;
  const bold   = document.getElementById('toggleBold').classList.contains('on')   ? 'bold '   : '';
  const italic = document.getElementById('toggleItalic').classList.contains('on') ? 'italic ' : '';
  ctx.font = `${italic}${bold}${fs}px "${ff}"`;
  ctx.textBaseline = 'middle';
  ctx.fillText(displayStr, x + 4, y + h / 2);

  state.modified = true;
  setStatus('Date appliquée. Téléchargez ou ajustez.', 'ok');
  showToast('Date appliquée.');
}

btnApply.addEventListener('click', applyOverlay);

[posXEl, posYEl, zoneWEl, zoneHEl, fontSzEl,
 textColEl, bgColEl, dateFmtEl, fontFamEl, newDateEl,
 newTimeEl, timeFmtEl].forEach(el => {
  el.addEventListener('input',  () => { if (state.modified) applyOverlay(); });
  el.addEventListener('change', () => { if (state.modified) applyOverlay(); });
});

// ── Claude detection ───────────────────────────────────
btnDetect.addEventListener('click', async () => {
  const apiKey = getApiKey();
  if (!apiKey) { showToast('Entrez votre clé API Anthropic.'); if (isMobile()) apiBarEl.classList.add('open'); return; }
  if (!state.base64Data) { showToast('Chargez une image d\'abord.'); return; }

  setStatus('Envoi à Claude…', 'busy');
  btnDetect.disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: state.mediaType, data: state.base64Data }
            },
            {
              type: 'text',
              text: `Tu es un expert en analyse de documents. Examine cette image de facture et localise la date principale (date de facture ou date d'émission).
Retourne UNIQUEMENT un objet JSON valide, sans aucun texte avant ou après, avec exactement ces champs :
{
  "x": <position X en pixels du coin supérieur gauche de la zone date>,
  "y": <position Y en pixels du coin supérieur gauche de la zone date>,
  "width": <largeur en pixels de la zone date>,
  "height": <hauteur en pixels de la zone date>,
  "fontSize": <taille de police estimée en pixels>,
  "color": <couleur du texte en hexadécimal, ex: "#000000">,
  "originalDate": <la date telle qu'écrite sur la facture, ex: "15/03/2024">
}
Sois précis sur les coordonnées. Si tu ne trouves pas de date, retourne quand même le JSON avec originalDate = "Non détectée" et des estimations raisonnables.`
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const raw  = data.content?.[0]?.text || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Réponse non-JSON de Claude.');

    const det = JSON.parse(jsonMatch[0]);
    state.detection = det;

    posXEl.value  = Math.max(0,  Math.round(det.x));
    posYEl.value  = Math.max(0,  Math.round(det.y));
    zoneWEl.value = Math.max(20, Math.round(det.width));
    zoneHEl.value = Math.max(10, Math.round(det.height));
    fontSzEl.value= Math.max(6,  Math.round(det.fontSize));
    if (/^#[0-9a-fA-F]{6}$/.test(det.color)) textColEl.value = det.color;
    syncSliders();

    origDateTx.textContent = `Date originale : ${det.originalDate}`;
    detBadge.classList.add('visible');

    setStatus(`Détecté : "${det.originalDate}". Choisissez une date et appliquez.`, 'ok');
    showToast(`Détection réussie : ${det.originalDate}`);

  } catch (err) {
    setStatus(`Erreur API : ${err.message}`, 'err');
    showToast('Erreur de détection.');
    console.error(err);
  } finally {
    btnDetect.disabled = false;
  }
});

// ── Download ───────────────────────────────────────────
function doDownload() {
  if (!state.originalImage) return;
  const link = document.createElement('a');
  link.download = `facture-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Téléchargement lancé.');
}
btnDownload.addEventListener('click', doDownload);
btnDownloadM.addEventListener('click', doDownload);

// ── Reset ──────────────────────────────────────────────
function doReset() {
  if (!state.originalImage) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(state.originalImage, 0, 0);
  state.modified = false;
  setStatus('Image réinitialisée.', 'ok');
  showToast('Image restaurée.');
}
btnReset.addEventListener('click', doReset);
btnResetM.addEventListener('click', doReset);

// ── Color chips ────────────────────────────────────────
function setupChips(containerId, colorInput, onPick) {
  const container = document.getElementById(containerId);
  container.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const color = chip.dataset.color;
    // Update active state
    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    // Update color picker (skip for transparent)
    if (color !== 'transparent') colorInput.value = color;
    if (onPick) onPick(color);
    if (state.modified) applyOverlay();
  });
  // Sync chip active state when color picker changes manually
  colorInput.addEventListener('input', () => {
    container.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.color === colorInput.value);
    });
  });
}

setupChips('textChips', textColEl);
setupChips('bgChips',   bgColEl);

// ── Bold / Italic toggles ──────────────────────────────
['toggleBold', 'toggleItalic'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    this.classList.toggle('on');
    if (state.modified) applyOverlay();
  });
});

// ── Time toggle ────────────────────────────────────────
toggleTimeEl.addEventListener('click', function() {
  const on = this.classList.toggle('on');
  timeOptEl.style.display = on ? 'block' : 'none';
  if (state.modified) applyOverlay();
});

// Store transparent flag separately
let useTransparentBg = false;
document.getElementById('bgChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  useTransparentBg = chip.dataset.color === 'transparent';
});

// ── Default date & time ────────────────────────────────
newDateEl.value = new Date().toISOString().slice(0, 10);
const _now = new Date();
newTimeEl.value = `${String(_now.getHours()).padStart(2,'0')}:${String(_now.getMinutes()).padStart(2,'0')}:${String(_now.getSeconds()).padStart(2,'0')}`;

// ── Service Worker ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>

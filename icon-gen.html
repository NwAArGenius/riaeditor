<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Générateur d'icônes — papaNiang.editor</title>
  <style>
    body { font-family: sans-serif; background: #0e0f13; color: #e4e6f0; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; }
    canvas { border-radius: 16px; }
    button { padding: 10px 24px; background: #6c63ff; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: .85; }
    .row { display: flex; gap: 40px; align-items: flex-end; }
    p { color: #6b7080; font-size: .85rem; }
  </style>
</head>
<body>
  <h2>Générateur d'icônes PNG</h2>
  <p>Télécharge les deux icônes puis place-les dans le dossier de déploiement.</p>
  <div class="row">
    <div style="text-align:center">
      <canvas id="c192" width="192" height="192"></canvas><br/>
      <button onclick="dl('c192','icon-192.png')" style="margin-top:10px">icon-192.png</button>
    </div>
    <div style="text-align:center">
      <canvas id="c512" width="512" height="512"></canvas><br/>
      <button onclick="dl('c512','icon-512.png')" style="margin-top:10px">icon-512.png</button>
    </div>
  </div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.19;

  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#a78bfa');
  grad.addColorStop(1, '#6c63ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, s, s);

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.round(s * 0.43)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('pN', s / 2, s / 2);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
